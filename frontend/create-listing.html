<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Listing - College Marketplace</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .form-wrap {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      color: #111827;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .msg {
      margin-top: 0.75rem;
      font-size: 0.95rem;
    }

    .msg.error {
      color: #b91c1c;
    }

    .msg.success {
      color: #047857;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">College Marketplace</h1>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="my-listings.html" class="nav-link">My Listings</a>
        <a href="settings.html" class="nav-link">Settings</a>
        <a href="create-listing.html" class="nav-link active">Add Listing</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="header">
      <h2>Create New Listing</h2>
      <p>Add your product so other students can buy it.</p>
    </section>

    <section class="form-wrap">
      <form id="createListingForm">
        <div class="field">
          <label for="title">Product Title</label>
          <input id="title" type="text" required maxlength="255" placeholder="e.g. Used Calculus Textbook" />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Condition, model, usage details"></textarea>
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input id="price" type="number" step="0.01" min="0" required placeholder="e.g. 2500 (INR)" />
        </div>

        <div class="field">
          <label for="productImage">Product Image</label>
          <input id="productImage" type="file" accept="image/*" />
          <small style="color:#6b7280; display:block; margin-top:0.35rem;">Upload from your device (max 2 MB).</small>
        </div>

        <div class="form-actions">
          <button class="btn-primary" type="submit">Create Listing</button>
          <button class="btn-secondary" type="button" id="goMyListings">Go to My Listings</button>
        </div>

        <p id="formMsg" class="msg" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    const API_BASE_URL = window.APP_CONFIG?.API_BASE_URL || 'http://localhost:5000/api';
    const TOKEN_KEY = 'marketplace_token';

    const form = document.getElementById('createListingForm');
    const msg = document.getElementById('formMsg');
    const goMyListingsBtn = document.getElementById('goMyListings');
    const imageInput = document.getElementById('productImage');

    function setMessage(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }

    function ensureAuthenticated() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        window.location.href = 'login.html';
        return null;
      }
      return token;
    }

    goMyListingsBtn.addEventListener('click', () => {
      window.location.href = 'my-listings.html';
    });

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Failed to read image file'));
        reader.readAsDataURL(file);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = ensureAuthenticated();
      if (!token) return;

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const price = document.getElementById('price').value;
      const selectedFile = imageInput.files && imageInput.files[0] ? imageInput.files[0] : null;

      if (!title || !price) {
        setMessage('Title and price are required.', 'error');
        return;
      }

      let image_url = null;
      if (selectedFile) {
        if (selectedFile.size > 2 * 1024 * 1024) {
          setMessage('Image too large. Please upload a file under 2 MB.', 'error');
          return;
        }

        try {
          image_url = await fileToDataUrl(selectedFile);
        } catch (error) {
          setMessage(error.message, 'error');
          return;
        }
      }

      setMessage('Creating listing...', '');

      try {
        const response = await fetch(`${API_BASE_URL}/products`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ title, description, price, image_url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to create listing');
        }

        setMessage('Listing created successfully. Redirecting...', 'success');
        form.reset();
        setTimeout(() => {
          window.location.href = 'my-listings.html';
        }, 900);
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });

    ensureAuthenticated();
  </script>
</body>
</html>
